openapi: 3.0.0
info:
  title: EatCloud Modernizado API
  description: |
    API REST para la modernización de la plataforma EatCloud, enfocada en la gestión masiva de datos (PODs, cuentas, auditorías).
  version: 1.0.0
servers:
  - url: https://devservice.eatcloud.info
    description: Entorno de Desarrollo
  - url: https://service.eatcloud.info
    description: Entorno de Producción
paths:
  /auth/login:
    post:
      summary: Autenticación de usuarios
      description: Genera un JWT necesario para consultas privadas.
      responses:
        '200':
          description: Login exitoso
  /api/{table_name}:
    get:
      summary: Consultas Privadas (Requiere Token)
      description: Permite realizar lecturas con parámetros como _limit, _offset y _cmp.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: table_name
          required: true
          schema:
            type: string
        - in: query
          name: _limit
          schema:
            type: integer
        - in: query
          name: _offset
          schema:
            type: integer
      responses:
        '200':
          description: Datos recuperados
  /apipub/{table_name}:
    get:
      summary: Consultas Públicas
      description: Lecturas que no requieren autenticación JWT.
      parameters:
        - in: path
          name: table_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Datos recuperados
  /crd/create/{table_name}:
    post:
      summary: Crear Registros (Create)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registro creado
  /crd/update/{table_name}:
    post:
      summary: Actualizar Registros (Update)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registro actualizado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
